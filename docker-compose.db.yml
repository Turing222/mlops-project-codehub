x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
services:

  postgres:
    image: pgvector/pgvector:0.8.1-pg17-bookworm
    container_name: pgvector-17-stable_test
    env_file:
      - .env
    # 1. 在服务内挂载卷
    volumes:
      - pg_data_v17_test:/var/lib/postgresql/data
    #  - ./scripts/pgsql_backup.sh:/usr/local/bin/pg_backup.sh:ro
    logging: *default-logging
    #entrypoint: [ "/bin/sh", "/usr/local/bin/pg_backup.sh" ]
    deploy:
      resources:
        limits:
          memory: 1024M
          #共享缓冲区 工作内存 维护工作内存 有效缓存预测 最大连接数
    command: >
      postgres -c shared_buffers=256MB   -c work_mem=32MB   -c maintenance_work_mem=128MB  -c effective_cache_size=768MB -c max_connections=200 -c logging_collector=on
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
  api:
    image: ai-tutor-backend:v1

    # 限制 Docker 自身收集的控制台日志大小，防止撑爆磁盘
    #只管控制台日志
    logging: *default-logging
    user: "${CURRENT_UID}:${CURRENT_GID}"
    # 模拟 2026 生产环境 Python 3.11 优化环境
    volumes:
      - /backend:/app/backend
    env_file:
      - .env
    environment:
      - PYTHONMALLOC=default # 生产环境使用 default，debug 模式严重拖慢性能
      - WEB_CONCURRENCY=1 # 充分利用 1.5GB 内存，启动 2 个 Worker  Worker Process（工作进程） 测试时只开启一个
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 800M
        reservations:
          # 预留内存，确保容器不会因为内存碎片化启动失败
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # 1. 确保路径与你的路由完全一致
      # 2. 使用 python3 确保兼容性
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/health_check/live\", timeout=5)' || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s # 考虑到 FastAPI 启动和数据库连接，给 10 秒缓冲
    command: uvicorn app.backend.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers
    ports:
      - "8000:8000"
volumes:
  pg_data_v17_test:
    name: prod_db_volume_test

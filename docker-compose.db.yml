x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"
services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg17-bookworm
    container_name: pgvector-17-stable_test
    env_file:
      - .env
    # 1. 在服务内挂载卷
    volumes:
      - pg_data_v17_test:/var/lib/postgresql/data
    #  - ./scripts/pgsql_backup.sh:/usr/local/bin/pg_backup.sh:ro
    logging: *default-logging
    #entrypoint: [ "/bin/sh", "/usr/local/bin/pg_backup.sh" ]
    deploy:
      resources:
        limits:
          memory: 1024M
          #共享缓冲区 工作内存 维护工作内存 有效缓存预测 最大连接数
    command: >
      postgres -c shared_buffers=256MB   -c work_mem=32MB   -c maintenance_work_mem=128MB  -c effective_cache_size=768MB -c max_connections=200 -c logging_collector=on
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7.4-alpine
    container_name: redis_test
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging
    command: >
      redis-server --maxmemory 384mb --maxmemory-policy allkeys-lru --requirepass "${REDIS_PASSWORD}"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  db_migrator:
    image: ai-tutor-backend:v1
    env_file:
      - .env
    volumes:
      - ./backend:/app/backend
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
    command: alembic upgrade head
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  api:
    image: ai-tutor-backend:v1
    logging: *default-logging
    user: "${CURRENT_UID}:${CURRENT_GID}"
    volumes:
      - ./backend:/app/backend
      - knowledge_files_volume_test:/data/knowledge_files
    env_file:
      - .env
    environment:
      - PYTHONMALLOC=default
      - WEB_CONCURRENCY=1
      - KNOWLEDGE_STORAGE_ROOT=/data/knowledge_files
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 800M
        reservations:
          memory: 256M
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      db_migrator:
        condition: service_completed_successfully
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/api/v1/health_check/live\", timeout=5)' || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --proxy-headers
    ports:
      - "8000:8000"

  task_worker:
    image: ai-tutor-backend:v1
    container_name: task_worker_test
    user: "${CURRENT_UID}:${CURRENT_GID}"
    logging: *default-logging
    volumes:
      - ./backend:/app/backend
      - knowledge_files_volume_test:/data/knowledge_files
    env_file:
      - .env
    environment:
      - TASKIQ_REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/1
      - KNOWLEDGE_STORAGE_ROOT=/data/knowledge_files
    command: taskiq worker backend.core.task_broker:broker backend.tasks.llm_tasks backend.tasks.knowledge_tasks --workers 2
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db_migrator:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 128M

volumes:
  pg_data_v17_test:
    name: prod_db_volume_test
  knowledge_files_volume_test:
    name: knowledge_files_volume_test

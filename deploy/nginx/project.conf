# 1. 定义 JSON 日志格式，使之能被 Loki/Grafana 自动化解析
log_format json_combined escape=json
  '{'
    '"timestamp":"$time_iso8601",'
    '"remote_addr":"$remote_addr",'
    '"remote_user":"$remote_user",'
    '"request":"$request",'
    '"message":"$request_method $request_uri $server_protocol -> $status",'
    '"status": "$status",'
    '"body_bytes_sent":"$body_bytes_sent",'
    '"request_time":"$request_time",'
    '"http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent",'
    '"rid":"$http_x_request_id"'
  '}';
# 定义后端服务池 (Upstream)
upstream backend_servers {
    # 轮询 (Round Robin) 是默认策略
    least_conn;
    server api:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;

    # DBA 视角：如果需要会话保持，可以开启 ip_hash
    # ip_hash; 
}
server {
    listen 80;
    server_name mentor.test;
    # 修改 301 为 308：
    # 301 永久重定向会让很多客户端（如 Python requests）把 POST 请求降级变成 GET，从而导致后端的 405 错误。
    # 308 (Permanent Redirect) 或 307 (Temporary Redirect) 能够保证重定向时保留原始的以 POST 等方法发出的请求和请求体。
    return 308 https://$host$request_uri;
}
server {
#    listen 80;
#    server_name localhost;
    listen 443 ssl http2;
    server_name mentor.test;

    # 指向容器内的路径（刚才 volumes 映射的位置）
    ssl_certificate     /etc/nginx/ssl/ssl.crt;
    ssl_certificate_key /etc/nginx/ssl/ssl.key;

    # SSL 优化配置（DBA 建议：减少握手开销，保住你的内存）
    ssl_session_cache    shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout  5m;
    ssl_prefer_server_ciphers  on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';

    # --- 安全响应头 ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# 2. 启用该格式的日志，并强制输出到标准输出 (stdout) 以便 Docker 捕获
    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    # --- 静态资源缓存 ---
    # 注意：Nginx 的 add_header 在 location 块中会覆盖 server 级别的所有 add_header，
    # 因此必须在此处重复声明安全头。
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        # 重复声明安全头（Nginx location 级别 add_header 会覆盖 server 级别）
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        access_log off;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # 核心：如果找不到资源，统一指向 index.html，让 React Router 接管路由
        # 排除 /api/ 路径，避免 API 请求被前端拦截
        try_files $uri $uri/ @frontend;
    }

    # 前端路由处理
    location @frontend {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # 反向代理：解决跨域问题，将 /api 开头的请求转发到后端
    location /api/ {
        # 1. 在入口处生成或透传 Request ID
        proxy_set_header X-Request-ID $request_id;
        
        # 2. 基础透传 (添加末尾斜杠，Nginx 会自动移除 /api 前缀后再转发给后端)
        proxy_pass http://backend_servers/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 3. 路径重写
        #3rewrite ^/api/(.*)$ /$1 break;
        
        # 告知后端它被挂载在 /api 下（这对 Swagger UI 至关重要）
        #proxy_set_header X-Forwarded-Prefix /api;

        # 4. 针对 LLM 流式响应的优化 (Ollama 必备)
        proxy_http_version 1.1;       # 必须用 HTTP/1.1 才能支持长连接
        proxy_set_header Connection ""; #配合 keepalive
        proxy_buffering off;          # 关闭缓冲区！否则 Nginx 会攒够一波数据才发给前端，流式效果会卡顿
        proxy_cache off;              # AI 响应通常不缓存

        # 超时控制：给 AI 思考预留时间
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # 禁用 Nginx 的响应解析，让数据直接吐给前端
        proxy_ignore_client_abort on;
    }
}
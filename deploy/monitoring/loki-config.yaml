auth_enabled: false
server:
  http_listen_port: 3100

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  allow_structured_metadata: true # 3.x 特性：支持更丰富的元数据
  retention_period: 168h          # 7天保留，与 Prometheus 保持一致

compactor:
  working_directory: /loki/compactor
  retention_enabled: true         # 启用自动清理过期数据
  compaction_interval: 10m
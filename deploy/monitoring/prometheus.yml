global:
  scrape_interval: 15s # 每 15 秒抓取一次数据，默认是 1 分钟

scrape_configs:
  # Prometheus 监控它自己
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # FastAPI 后端指标抓取
  - job_name: "fastapi-backend"
    static_configs:
      - targets: ["api:8000"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres_exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis_exporter:9121"]
sources:
  docker_socket:
    type: docker_logs
    # 自动识别所有容器

transforms:
  # 关键：提取容器名并解析 JSON 日志
  parse_and_label:
    type: remap
    inputs: ["docker_socket"]
    source: |
      # 提取更友好的容器名（去掉开头的斜杠）
      .service = replace(string!(.container_name), "/", "")
      
      # 解析 JSON 消息
      parsed, err = parse_json(.message)
      if err == null {
          # 将解析出的字段合并到顶层
          . = merge!(., parsed)
          if .level == null { .level = "info" }
          
          # --- 瘦身：删除不需要的冗余元数据 ---
          del(.label)
          del(.container_id)
          del(.container_created_at)
          del(.host)
          del(.source_type)
          del(.stream)
          del(.image)
          
          del(.message) 
      } else {
          .level = "info"
      }

sinks:
  loki_sink:
    type: loki
    inputs: ["parse_and_label"]
    endpoint: "http://loki:3100"
    encoding: { codec: "json" }
    labels:
      service: "{{ service }}"
      level: "{{ level }}"
      env: "production"
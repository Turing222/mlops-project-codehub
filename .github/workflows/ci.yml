name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync Python dependencies
        run: uv sync --frozen --dev

      - name: Run unit tests
        run: make qa-test-unit

      - name: Run integration tests
        run: make qa-test-integration

      - name: Run lint
        run: make qa-lint

      - name: Run typecheck
        run: make qa-typecheck

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: qa
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare CI environment file
        shell: bash
        run: |
          cat > .env <<EOF
          SECRET_KEY=ci-secret-key
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=securepassword123
          POSTGRES_DB=postgres
          POSTGRES_SERVER=postgres
          REDIS_HOST=redis
          REDIS_PORT=6379
          REDIS_PASSWORD=redis123
          CURRENT_UID=$(id -u)
          CURRENT_GID=$(id -g)
          LLM_PROVIDER=mock
          RAG_EMBED_PROVIDER=openai-compatible
          RAG_EMBED_MODEL_NAME=nomic-embed-text
          RAG_EMBED_BASE_URL=http://win.host:11434/v1
          RAG_EMBED_API_KEY=ollama
          KNOWLEDGE_STORAGE_ROOT=/data/knowledge_files
          EOF

      - name: Build Docker image
        run: make image-build

      - name: Start smoke environment
        run: make env-smoke-up

      - name: Wait for smoke environment
        run: make env-smoke-wait

      - name: Verify smoke checks
        run: make verify-smoke

      - name: Dump smoke logs on failure
        if: failure()
        run: make env-smoke-logs

      - name: Tear down smoke environment
        if: always()
        run: make env-smoke-down

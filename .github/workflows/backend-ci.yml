name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "Makefile"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "backend/**"
      - "tests/**"
      - "scripts/**"
      - "pyproject.toml"
      - "uv.lock"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "Makefile"
      - ".github/workflows/backend-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync Python dependencies
        run: uv sync --frozen --dev

      - name: Run unit tests
        run: make qa-test-unit

      - name: Run integration tests
        run: make qa-test-integration

      - name: Run lint
        run: make qa-lint

      - name: Run typecheck
        run: make qa-typecheck

  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    needs: qa
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync Python dependencies
        run: uv sync --frozen --dev

      - name: Prepare smoke environment file
        run: make env-smoke-prepare

      - name: Build Docker image
        run: make image-build

      - name: Start smoke environment
        run: make env-smoke-up

      - name: Wait for smoke environment
        run: make env-smoke-wait

      - name: Verify smoke checks
        run: make verify-smoke

      - name: Dump smoke logs on failure
        if: failure()
        run: make env-smoke-logs

      - name: Tear down smoke environment
        if: always()
        run: make env-smoke-down
